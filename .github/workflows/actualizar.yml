name: Actualizar Base de Datos Skywave

on:
  schedule:
    - cron: '0 12 * * 0' # Domingos a las 12:00 UTC
  workflow_dispatch:      # Permite ejecución manual

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar script de conversión
        run: python convertir_eibi.py

      - name: Subir cambios a GitHub
        run: |
          git config --local user.name "Skywave Updater"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # Agrega todo el directorio updates de forma segura
          git add updates/
          
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática EiBi: $(date +'%Y-%m-%d')"
          
          # Push explícito a la rama main
          git push origin main
